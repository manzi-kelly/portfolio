<!doctype html>
<html lang="en">
  <head>

    <meta name="google-site-verification" content="QWoFcWlJkNoEhZrUEHsQ98MEv6yeNQkm18bGDhQklxA" />

    <!-- FAVICON -->

      content="index, follow"
    />

    <!-- THEME -->
    <meta
      name="theme-color"
      content="#4f46e5"
    />

    <!-- OPEN GRAPH -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:title"
      content="Manzi Kelly | Frontend Developer"
    />

    <meta
      property="og:description"
      content="Explore premium digital experiences, modern websites, AI systems, and UI/UX projects built by Manzi Kelly."

      name="twitter:title"
      content="Manzi Kelly | Frontend Developer"
    />

      name="twitter:description"
      content="Modern websites, React apps, AI systems, and premium UI/UX experiences."

      name="twitter:image"
      content="/mine.png"
    />

    <!-- FONTS -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- SMOOTH SCROLL -->
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #ffffff;
      }

      ::selection {
        background: #4f46e5;
        color: white;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #0f172a;
      }

      ::-webkit-scrollbar-thumb {
        background: #4f46e5;
        border-radius: 999px;
      }
    </style>

  <body class="bg-white dark:bg-[#020617] transition-colors duration-300">
    <div id="root"></div>

    <script
      type="module"
